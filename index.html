<!DOCTYPE html>
<html lang="zh-TW">
 
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>羽球分組</title>


<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1976d2">


<style>


body{

font-family:Arial,"Microsoft JhengHei",sans-serif;

padding:15px;

background:#f3f3f3;

}


h1{

text-align:center;

}



.card{

background:white;

padding:15px;

margin-bottom:15px;

border-radius:12px;

box-shadow:
0 2px 6px rgba(0,0,0,.08);

}



button{

width:100%;

padding:16px;

margin-top:10px;

border:0;

border-radius:12px;

background:#1976d2;

color:white;

font-size:18px;

}



.end{

background:#f57c00;

}



input{

padding:8px;

margin:5px;

font-size:16px;

}



.player{

background:white;

padding:15px;

margin:10px 0;

border-radius:12px;

box-shadow:
0 2px 6px rgba(0,0,0,.12);

}



.edit{

background:#388e3c;

}



.delete{

background:#d32f2f;

}



.status{

background:#e3f2fd;

padding:15px;

border-radius:12px;

font-size:18px;

line-height:1.8;

}



.match{

background:white;

padding:15px;

margin-top:10px;

border-radius:12px;

text-align:center;

font-size:18px;

}



.smallBtn{

width:auto;

font-size:14px;

padding:8px 12px;

}


</style>


</head>



<body>


<h1>
🏸 羽球分組
</h1>




<div class="card">


<h2>
新增球友
</h2>


<input id="name" placeholder="姓名">


<input 
id="level"
type="number"
placeholder="能力值">


<button onclick="addPlayer()">

新增球友

</button>


</div>





<div class="card">


<h2>
球友列表
</h2>


<div id="players"></div>


</div>





<div class="card">


<h2>
今日球局
</h2>



球場數：

<input
id="court"
type="number"
value="1"
min="1">





<button onclick="selectAllPlayers()">

全部選取

</button>


<button onclick="clearAllPlayers()">

取消全部

</button>




<h3>
參加人員
</h3>


<div id="selectPlayers"></div>




<button onclick="nextRound()">

下一輪

</button>




<button class="end" onclick="endToday()">

結束今日球局

</button>


</div>





<div class="card">


<h2>
今日狀態
</h2>


<div id="status" class="status">

尚未開始球局

</div>


</div>





<div class="card">


<h2>
比賽結果
</h2>


<div id="result"></div>


</div>






<script src="app.js"></script>



<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"service-worker.js"
);

}

</script>



</body>

</html>
